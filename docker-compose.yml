services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-bank_db}
      MYSQL_USER: ${DB_USER:-bank_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bank_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./bank_db.sql:/docker-entrypoint-initdb.d/01-bank_db.sql:ro
      - ./docker/mysql/init/02-password-upgrade.sql:/docker-entrypoint-initdb.d/02-password-upgrade.sql:ro
      - ./docker/mysql/init/03-profile-fields.sql:/docker-entrypoint-initdb.d/03-profile-fields.sql:ro
      - ./docker/mysql/init/04-currency-ssn.sql:/docker-entrypoint-initdb.d/04-currency-ssn.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-bank_user}
      DB_PASSWORD: ${DB_PASSWORD:-bank_pass}
      DB_NAME: ${DB_NAME:-bank_db}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080/online-banking}
      APP_ENV: ${APP_ENV:-development}
      APP_PRIMARY_CURRENCY: ${APP_PRIMARY_CURRENCY:-USD}
      SSN_ENCRYPTION_KEY: ${SSN_ENCRYPTION_KEY:-}
      ADMIN_REGISTRATION_ENABLED: ${ADMIN_REGISTRATION_ENABLED:-false}
      ADMIN_POOL_ACCOUNT: ${ADMIN_POOL_ACCOUNT:-338509629}
    volumes:
      - .:/var/www/html/online-banking
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: