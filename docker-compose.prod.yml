# Production overrides. Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  db:
    ports: !reset []
    restart: always

  web:
    restart: always
    environment:
      APP_ENV: production
    ports: !reset []

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html/online-banking:ro
    depends_on:
      web:
        condition: service_started